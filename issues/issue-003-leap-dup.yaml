id: 3
title: Adding a task due "feb 29" crashes in non-leap years
labels: [bug, dates]
severity: medium
state: open
author: carol
created_at: 2026-06-04
body: |
  `taskflow add "pay taxes" --due "feb 29"` throws when the current year
  is not a leap year, instead of clamping to Feb 28 as the docs say.

  This is the same underlying defect as #1 (parse_due not clamping). It
  surfaces directly on add rather than via recurrence. Likely should be
  closed as a duplicate of #1 once the parsing fix lands.
